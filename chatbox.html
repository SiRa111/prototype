<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude-Inspired AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111827;
            color: #ececf1;
            display: flex;
            font-size: 18px;
            font-weight: 400;
        }

        @keyframes glowPulse {
            0%, 100% {
                opacity: 0.9;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes fluidWaveGlow {
            0%, 100% {
                opacity: 0.9;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes glowBorder {
            0%, 100% {
                opacity: 0.9;
            }
            50% {
                opacity: 1;
            }
        }

        /* ──────────────── SIDEBAR ──────────────── */
        .sidebar {
            width: 80px;
            background: #111827;
            border-right: 1px solid #2a2a2f;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            overflow-y: auto;
            flex-shrink: 0;
            gap: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Instrument Serif', serif;
            font-size: 36px;
            font-weight: 600;
            color: #ececf1;
            letter-spacing: -1.2px;
            padding: 16px 12px;
            flex-shrink: 0;
        }

        .logo img {
            display: none;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .new-chat-btn {
            width: 48px;
            height: 48px;
            background: transparent;
            border: 1px solid #2a2a2f;
            color: #ececf1;
            border-radius: 8px;
            cursor: pointer;
            font-size: 22px;
            font-weight: 400;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .new-chat-btn:hover {
            background: #1a1a1f;
            border-color: #3a3a3f;
        }

        .history-label {
            display: none;
        }

        .conversation-history {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .conversation-item {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            color: #9a9a9f;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .conversation-item:hover {
            background: #1a1a1f;
            color: #ececf1;
            border-color: #2a2a2f;
        }

        .conversation-item.active {
            background: #1a1a1f;
            color: #ececf1;
            border-color: #3a7fd8;
            border: 2px solid #3a7fd8;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #3a3a3f;
            border-radius: 3px;
        }

        .conversation-item svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ──────────────── MAIN CONTENT ──────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #111827;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 40px 0;
        }

        .messages-wrapper {
            max-width: 950px;
            margin: 0 auto;
            width: 100%;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: messageEnter 0.4s ease-out;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        @keyframes messageEnter {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            display: none;
        }

        .message-content {
            max-width: 600px;
            word-wrap: break-word;
            line-height: 1.6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 18px;
            font-weight: 400;
        }

        .message.user .message-content {
            background: #3a7fd8;
            padding: 12px 16px;
            border-radius: 20px;
            color: #ffffff;
            border: 1px solid #4a8fe8;
        }

        .message.assistant .message-content {
            padding: 0;
            color: #ececf1;
            background: transparent;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a8a8f;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #3a3a3f;
            border-radius: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #4a4a4f;
        }

        /* ──────────────── INPUT BAR ──────────────── */
        .input-area {
            padding: 24px 0 32px;
            background: linear-gradient(to top, #111827 70%, transparent);
            pointer-events: none;
        }

        .input-wrapper {
            max-width: 950px;
            margin: 0 auto;
            width: 100%;
            padding: 0 40px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .input-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 0;
        }

        .input-container::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 16px;
            background: radial-gradient(ellipse at center, rgba(58, 127, 216, 0.7), rgba(58, 127, 216, 0.35) 40%, transparent 75%);
            filter: blur(16px);
            z-index: -1;
            animation: glowBorder 8s ease-in-out infinite;
            opacity: 1;
        }

        textarea {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #ececf1;
            background: #1a1a1f;
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            resize: none;
            outline: none;
            max-height: 60px;
            min-height: 32px;
            transition: all 0.3s ease;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        textarea::placeholder {
            color: #5a5a5f;
        }

        textarea:focus {
            border: none;
            background: #1a1a1f;
        }

        .send-button {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #3a7fd8;
            border: 1px solid rgba(58, 127, 216, 0.5);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-top: auto;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .send-button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .send-button:hover:not(:disabled) {
            background: #4a8fe8;
            border-color: rgba(74, 143, 232, 0.7);
            box-shadow: 0 0 15px rgba(58, 127, 216, 0.4), 
                        0 0 30px rgba(58, 127, 216, 0.2);
        }

        .send-button:hover:not(:disabled)::before {
            opacity: 1;
        }

        .send-button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-button:disabled {
            background: #2a2a2f;
            color: #5a5a5f;
            cursor: not-allowed;
            border-color: #2a2a2f;
        }

        /* ──────────────── WELCOME STATE ──────────────── */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-title {
            font-family: 'Instrument Serif', serif;
            font-size: 32px;
            font-weight: 400;
            color: #ececf1;
            margin-bottom: 12px;
            letter-spacing: -0.6px;
        }

        .welcome-subtitle {
            color: #8a8a8f;
            font-size: 15px;
            font-weight: 350;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ──────────────── GREETING SECTION ──────────────── */
        .greeting-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            animation: fadeIn 0.6s ease-out;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .greeting-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting-content {
            text-align: center;
            padding: 40px 20px;
        }

        .greeting-title {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 400;
            color: #ececf1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .flip-container {
            display: inline-block;
            position: relative;
            height: 1.2em;
            overflow: hidden;
            vertical-align: bottom;
            width: 280px;
            padding: 0 4px;
        }

        .flip-word {
            display: block;
            position: absolute;
            width: 100%;
            text-align: left;
            font-style: italic;
            color: #3a7fd8;
            transform: translateY(100%);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
            min-width: max-content;
            white-space: nowrap;
        }

        .flip-word.active {
            transform: translateY(0);
            opacity: 1;
        }

        .flip-word.exit {
            transform: translateY(-100%);
            opacity: 0;
        }

        .greeting-subtitle {
            color: #8a8a8f;
            font-size: 15px;
            font-weight: 350;
            letter-spacing: 0.01em;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ──────────────── RESPONSIVE ──────────────── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 80px;
                border-right: none;
                border-bottom: 1px solid #2a2a2f;
                padding: 0 16px;
                flex-direction: row;
                align-items: center;
                overflow-x: auto;
                overflow-y: hidden;
                gap: 16px;
            }

            .logo {
                margin-bottom: 0;
                margin-right: 24px;
            }

            .new-chat-btn {
                margin-bottom: 0;
            }

            .history-label,
            .conversation-history {
                display: none;
            }

            .messages-wrapper {
                max-width: 100%;
            }

            .message-content {
                max-width: 100%;
            }

            .message.user .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <button class="logo" title="Home">Dan</button>
        <button class="new-chat-btn" title="New Chat">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </button>
        <div class="history-label">History</div>
        <div class="conversation-history">
            <div class="conversation-item active" title="About machine learning">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1"></circle>
                    <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6m-16.78 7.78l4.24-4.24m2.12-2.12l4.24-4.24"></path>
                </svg>
            </div>
            <div class="conversation-item" title="Design principles">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v6l4 2"></path>
                </svg>
            </div>
            <div class="conversation-item" title="Web development tips">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </div>
            <div class="conversation-item" title="Philosophy of AI">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <div class="conversation-item" title="Product strategy">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </div>
        </div>
    </div>

   <!-- Main Content -->
<div class="main-content">
    <div class="messages-area">
        <div class="messages-wrapper" id="messagesWrapper">
            <!-- Messages will appear here -->
        </div>
        <div class="greeting-container" id="greetingContainer">
            <div class="greeting-content">
                <div class="greeting-title">
                    Hi, I'm Dan — your
                    <span class="flip-container" id="flipper">
                        <span class="flip-word" data-index="0">AI assistant.</span>
                        <span class="flip-word" data-index="1">thought partner.</span>
                        <span class="flip-word" data-index="2">coding buddy.</span>
                        <span class="flip-word" data-index="3">creative muse.</span>
                        <span class="flip-word" data-index="4">research pal.</span>
                    </span>
                </div>
                <p class="greeting-subtitle">Ask me anything to get started.</p>
            </div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-area">
        <div class="input-wrapper">
            <div class="input-container">
                <textarea id="messageInput" placeholder="Ask me anything…"></textarea>
            </div>
            <button class="send-button" id="sendButton">↑</button>
        </div>
    </div>
</div>

<script>
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const messagesWrapper = document.getElementById('messagesWrapper');
    const messagesArea = document.querySelector('.messages-area');
    const greetingContainer = document.getElementById('greetingContainer');

    // ── Flip animation ──
    const words = document.querySelectorAll('.flip-word');
    let current = 0;

    words[0].classList.add('active');

    setInterval(() => {
        words[current].classList.remove('active');
        words[current].classList.add('exit');

        setTimeout(() => {
            words[current].classList.remove('exit');
            current = (current + 1) % words.length;
            words[current].classList.add('active');
        }, 500);
    }, 2800);

    // Auto-expand textarea
    messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        updateSendButton();
    });

    function updateSendButton() {
        sendButton.disabled = !messageInput.value.trim();
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || sendButton.disabled) return;

        // Hide greeting when first message is sent
        greetingContainer.classList.add('hidden');

        // Add user message
        const userMessageEl = document.createElement('div');
        userMessageEl.className = 'message user';
        userMessageEl.innerHTML = `<div class="message-content"><p>${escapeHtml(message)}</p></div>`;
        messagesWrapper.appendChild(userMessageEl);

        messageInput.value = '';
        messageInput.style.height = 'auto';
        updateSendButton();
        scrollToBottom();

        // Typing indicator
        const typingEl = document.createElement('div');
        typingEl.className = 'message assistant';
        typingEl.innerHTML = `<div class="message-avatar">C</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
        messagesWrapper.appendChild(typingEl);
        scrollToBottom();

        try {
            const response = await fetch('http://localhost:5000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });

            if (!response.ok) throw new Error('API error');

            const data = await response.json();
            typingEl.remove();

            const botMessageEl = document.createElement('div');
            botMessageEl.className = 'message assistant';
            botMessageEl.innerHTML = `<div class="message-avatar">C</div><div class="message-content"><p>${escapeHtml(data.response)}</p></div>`;
            messagesWrapper.appendChild(botMessageEl);
            scrollToBottom();
        } catch (error) {
            console.error('Error:', error);
            typingEl.remove();
            const errorEl = document.createElement('div');
            errorEl.className = 'message assistant';
            errorEl.innerHTML = `<div class="message-avatar">C</div><div class="message-content"><p>Sorry, there was an error connecting to the server.</p></div>`;
            messagesWrapper.appendChild(errorEl);
            scrollToBottom();
        }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !sendButton.disabled) {
            e.preventDefault();
            sendMessage();
        }
    });

    function scrollToBottom() {
        setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 0);
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    updateSendButton();
    messageInput.focus();
</script>
</body>
</html>
